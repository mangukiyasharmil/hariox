    <!-- Permanent startup recovery: stale chunks, failed script loads, and old SW caches -->
    <script>
      (function(){
        var reloaded = sessionStorage.getItem('__chunk_reload') === '1';

        function clearRecoveryFlag() {
          sessionStorage.removeItem('__chunk_reload');
          sessionStorage.removeItem('__chunk_reload_reason');
          try {
            var cleanUrl = new URL(window.location.href);
            if (cleanUrl.searchParams.has('__cb')) {
              cleanUrl.searchParams.delete('__cb');
              window.history.replaceState({}, '', cleanUrl.toString());
            }
          } catch (_) {}
        }

        function hardResetAndReload(reason) {
          if (reloaded) return;
          reloaded = true;
          sessionStorage.setItem('__chunk_reload', '1');
          sessionStorage.setItem('__chunk_reload_reason', reason || 'startup-recovery');

          var resetPromise = Promise.resolve();

          if ('serviceWorker' in navigator) {
            resetPromise = resetPromise.then(function () {
              return navigator.serviceWorker.getRegistrations()
                .then(function (registrations) {
                  return Promise.all(
                    registrations.map(function (registration) {
                      return registration.unregister().catch(function () { return false; });
                    })
                  );
                })
                .catch(function () {});
            });
          }

          if ('caches' in window) {
            resetPromise = resetPromise.then(function () {
              return caches.keys()
                .then(function (keys) {
                  return Promise.all(
                    keys.map(function (key) {
                      return caches.delete(key).catch(function () { return false; });
                    })
                  );
                })
                .catch(function () {});
            });
          }

          resetPromise.finally(function () {
            try {
              var url = new URL(window.location.href);
              url.searchParams.set('__cb', String(Date.now()));
              window.location.replace(url.toString());
            } catch (_) {
              window.location.reload();
            }
          });
        }

        // Catch stale dynamic import errors
        window.addEventListener('error', function(e){
          var message = e && e.message ? e.message : '';
          var target = e && e.target;
          var isAssetScriptError = !!(
            target &&
            target.tagName === 'SCRIPT' &&
            target.src &&
            target.src.indexOf('/assets/') !== -1
          );

          var isStaleChunkError =
            message.indexOf('Failed to fetch dynamically imported module') !== -1 ||
            message.indexOf('Importing a module script failed') !== -1 ||
            message.indexOf('error loading dynamically imported module') !== -1 ||
            message.indexOf('ChunkLoadError') !== -1;

          if (isAssetScriptError || isStaleChunkError) {
            hardResetAndReload('asset-or-chunk-error');
          }
        }, true);

        window.addEventListener('unhandledrejection', function(e){
          var msg = e && e.reason && e.reason.message ? e.reason.message : '';
          if(
            msg.indexOf('Failed to fetch dynamically imported module')!==-1 ||
            msg.indexOf('Importing a module script failed')!==-1 ||
            msg.indexOf('error loading dynamically imported module')!==-1 ||
            msg.indexOf('ChunkLoadError')!==-1
          ){
            e.preventDefault();
            hardResetAndReload('unhandledrejection-stale-chunk');
          }
        });

        // Clear flags after successful load so future deploys can self-heal again
        if(reloaded){
          window.addEventListener('load', function(){
            setTimeout(clearRecoveryFlag, 5000);
          });
        }

        // Blank screen fallback: if #root is still empty after 10s, force one hard reset
        setTimeout(function(){
          var root = document.getElementById('root');
          if(root && root.children.length === 0){
            hardResetAndReload('empty-root');
          }
        }, 10000);
      })();
    </script>
